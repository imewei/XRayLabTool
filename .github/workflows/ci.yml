name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} (${{ matrix.threads }} threads)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Primary: latest Julia, Linux, multi-threaded
          - version: '1'
            os: ubuntu-latest
            threads: 2
            coverage: true
          # Compat: minimum supported Julia version
          - version: '1.10'
            os: ubuntu-latest
            threads: 1
            coverage: false
          # Platform: macOS smoke test on latest only
          - version: '1'
            os: macos-latest
            threads: 1
            coverage: false
    env:
      JULIA_NUM_THREADS: ${{ matrix.threads }}
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}

      - uses: julia-actions/cache@v2

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1

      - uses: julia-actions/julia-processcoverage@v1
        if: matrix.coverage

      - uses: codecov/codecov-action@v5
        if: matrix.coverage
        with:
          files: lcov.info
          fail_ci_if_error: false

  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Check formatting
        run: |
          julia -e '
            using Pkg
            Pkg.add("JuliaFormatter")
            using JuliaFormatter
            result = format("src", overwrite=false)
            if result
              @info "Formatting check passed"
            else
              @error "Files need formatting. Run: using JuliaFormatter; format(\"src\")"
              exit(1)
            end'

  docs:
    name: Documentation
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      statuses: write
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'

      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=docs docs/make.jl
